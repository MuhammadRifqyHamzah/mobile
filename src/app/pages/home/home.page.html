<ion-content class="home-page">

  <!-- HEADER GRADIENT MD3 SECTION -->
  <div class="home-header">
    <!-- Glowing background elements -->
    <div class="header-glow-1"></div>
    <div class="header-glow-2"></div>

    <!-- APP BRANDING -->
    <div class="brand-bar">
      <img src="assets/images/Logo-JoyVent.jpg" class="brand-logo" alt="JoyVent Logo">
      <span class="brand-name">JoyVent</span>
    </div>

    <!-- TOP SECTION -->
    <div class="top-section">

      <div class="profile-section">

        <div class="profile-avatar-wrapper ion-activatable ripple-parent">
          <img 
            [src]="userAvatar" 
            alt="avatar" 
            class="profile-avatar"
          >
          <ion-ripple-effect></ion-ripple-effect>
        </div>

        <div class="profile-info">
          <h2>Hello, {{ userName }}!</h2>
          <p>
            <ion-icon name="location-outline" class="loc-icon"></ion-icon>
            <span>{{ userLocation }}</span>
          </p>
        </div>

      </div>

      <button class="notif-btn ion-activatable ripple-parent" (click)="goToNotifications()">
        <ion-icon name="notifications-outline"></ion-icon>
        <div class="notif-badge" *ngIf="unreadNotificationsCount > 0">
          {{ unreadNotificationsCount }}
        </div>
        <ion-ripple-effect></ion-ripple-effect>
      </button>

    </div>

    <!-- SEARCH BAR -->
    <div class="search-box">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input
        type="text"
        placeholder="Search events..."
        [(ngModel)]="searchQuery"
      >
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="category-wrapper">
    @for (cat of categories; track cat) {
      <button
        class="category ion-activatable ripple-parent"
        [class.active]="selectedCategory === cat"
        (click)="selectCategory(cat)">
        {{ cat }}
        <ion-ripple-effect></ion-ripple-effect>
      </button>
    }
  </div>

  <!-- TITLE -->
  <div class="section-title">
    <h2>Popular Event</h2>
    <span>View all</span>
  </div>

  <!-- EMPTY STATE -->
  @if (getFilteredEvents().length === 0) {
    <div class="empty-state">
      <div class="empty-icon-wrapper">
        <ion-icon name="search-outline"></ion-icon>
      </div>
      <h2>No events found</h2>
      <p>Try searching with another keyword or category</p>
    </div>
  }

  <!-- DYNAMIC EVENTS -->
  @for (event of getFilteredEvents(); track event.id) {
  <button
    class="event-card"
    [class.faded]="event.soldOut"
    (click)="goToDetail(event.id)">

    <div class="event-image">

      <img
        [src]="event.image"
        [alt]="event.title"
      >

      @if (event.soldOut) {
        <div class="event-badge sold-out">SOLD OUT</div>
        <div class="sold-out-overlay">
          <span>Fully Booked</span>
        </div>
      } @else {
        <div class="event-badge">
          {{ event.category }}
        </div>
      }

      <div class="favorite-btn" (click)="toggleSave($event, event.id)" [class.active]="isSaved(event.id)">
        <ion-icon [name]="isSaved(event.id) ? 'heart' : 'heart-outline'"></ion-icon>
      </div>

      <div 
        class="event-price-compact" 
        [class.free]="event.price.toLowerCase().includes('gratis')">
        {{ event.price.toLowerCase().includes('gratis') ? 'Free Event' : 'Start From ' + event.price.replace('Rp.', 'Rp') }}
      </div>
    </div>

    <div class="event-content">

      <h3>{{ event.title }}</h3>

      <div class="event-info">

        <span>📅 {{ event.date }}</span>

        <span>📍 {{ event.location }}</span>

      </div>

      @if (event.soldOut) {
        <div class="card-progress-container">
          <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" style="width: 100%"></div>
          </div>
          <div class="progress-info">
            <span>100% Tickets Sold Out</span>
          </div>
        </div>
      }

    </div>

  </button>
  }


</ion-content>
